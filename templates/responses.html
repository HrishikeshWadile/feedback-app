<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responses</title>
</head>

<body>
    <h2>All Feedback</h2>

    {% for item in data %}
    <hr>
    <p>Name: {{ item.name }}</p>
    <p>Rating: {{ item.rating }}</p>
    <p>Comment: {{ item.comment }}</p>
    {% endfor %}

    <a href="/">Back</a>
</body>

</html>
